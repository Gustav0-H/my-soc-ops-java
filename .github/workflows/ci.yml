name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run Checkstyle
        run: |
          cd socops
          ./mvnw -DskipTests checkstyle:check

      - name: Build package
        run: |
          cd socops
          ./mvnw clean package -DskipTests

      - name: Run tests
        run: |
          cd socops
          ./mvnw test
